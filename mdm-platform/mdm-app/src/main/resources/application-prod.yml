server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://db-server:3306/mdm?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: mdm_app
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 30000
      max-lifetime: 1800000
  data:
    redis:
      host: redis-server
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 0

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  level:
    com.mdm: info
    org.springframework: warn
